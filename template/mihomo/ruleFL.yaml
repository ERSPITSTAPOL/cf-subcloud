# Group-type Anchors
UrlTest: &UrlTest   {type: url-test, interval: 5400, tolerance: 100, lazy: true, url: "https://www.gstatic.com/generate_204", disable-udp: false, timeout: 3000, max-failed-times: 3, hidden: false, include-all: true}
Selector: &Selector {type: select, disable-udp: false, hidden: false, include-all: true}
# Group-Selector Anchors
SelectProxy: &SelectProxy {type: select, hidden: false, proxies: [🚀Global, 🇸🇬Singapore, 🇭🇰HongKong, 🇹🇼Taiwan, 🇺🇸United States, 🇯🇵Japan, 🇰🇷South Korea, 🛰Others]}
# Rule-Providers Anchors
DomainMrs: &DomainMrs {type: http, interval: 0, proxy: 🚀Global, behavior: domain, format: mrs}
IPcidrMrs: &IPcidrMrs {type: http, interval: 0, proxy: 🚀Global, behavior: ipcidr, format: mrs}
proxy-groups: 
  - {name: 🌐Google,      <<: *SelectProxy, icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png}
  - {name: 🔍AI Platform, <<: *SelectProxy, icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AI.png}
  - {name: 📖Wikipedia,   <<: *SelectProxy, icon: https://fastly.jsdelivr.net/gh/simple-icons/simple-icons@develop/icons/wikipedia.svg}
  - {name: 💲Payment,     <<: *SelectProxy, icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/PayPal.png}
  - {name: 🗼Pixiv,       <<: *SelectProxy, icon: https://fastly.jsdelivr.net/gh/simple-icons/simple-icons@develop/icons/pixiv.svg}
  - {name: 💬Telegram,    <<: *SelectProxy, icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram_X.png}
  # Areas
  - {name: 🚀Global,        <<: *Selector, proxies: [🚀Global-Auto], icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png}
  - {name: 🇭🇰HongKong,      <<: *Selector, proxies: [🇭🇰HK-Auto], filter: "/香港|🇭🇰|HK|Hong|HKG/i", icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png}
  - {name: 🇸🇬Singapore,     <<: *Selector, proxies: [🇸🇬SG-Auto], filter: "/坡|🇸🇬|狮城|新加坡|SG|Singapore|SIN|XSP/i", icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png}
  - {name: 🇹🇼Taiwan,        <<: *Selector, proxies: [🇹🇼TW-Auto], filter: "/台灣|台湾|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH/i", icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png}
  - {name: 🇺🇸United States, <<: *Selector, proxies: [🇺🇸US-Auto], filter: "/美|美国|🇺🇸|US|凤凰城|西雅图|USA|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD/i", icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png}
  - {name: 🇯🇵Japan,         <<: *Selector, proxies: [🇯🇵JP-Auto], filter: "/日本|东京|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK/i", icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png}
  - {name: 🇰🇷South Korea,   <<: *Selector, proxies: [🇰🇷ROK-Auto], filter: "/韩国|🇰🇷|韓|首尔|南朝鲜|KR|KOR|ROK|Korea|South/i", icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Korea.png}
