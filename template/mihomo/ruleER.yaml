# Group-type Anchors
Selector: &Selector {type: select, disable-udp: false, hidden: false, include-all: true}
UrlTest:  &UrlTest  {type: url-test, interval: 5400, tolerance: 100, lazy: true, url: "https://www.gstatic.com/generate_204", disable-udp: false, timeout: 3000, max-failed-times: 3, hidden: false}
# Group-Selector Anchors
SelectProxy: &SelectProxy {type: select, hidden: false, proxies: [🚀Global, 🇸🇬Singapore, 🇭🇰HongKong, 🇹🇼Taiwan, 🇺🇸United States, 🇯🇵Japan, 🇰🇷South Korea, 🛰Others]}
# Rule-Providers Anchors
DomainMrs: &DomainMrs {type: http, interval: 0, proxy: 🚀Global, behavior: domain, format: mrs}
IPcidrMrs: &IPcidrMrs {type: http, interval: 0, proxy: 🚀Global, behavior: ipcidr, format: mrs}
proxy-groups: 
  - {name: Google,   <<: *SelectProxy}
  - {name: Telegram, <<: *SelectProxy, default-selected: 🇸🇬Singapore}
  - {name: Meta,     <<: *SelectProxy}
  - {name: AI Platform, <<: *SelectProxy}
  # Areas
  - {name: 🚀Global,        <<: *Selector, proxies: [🚀Global-Auto]}
  - {name: 🇭🇰HongKong,      <<: *Selector, proxies: [🇭🇰HK-Auto], filter: "/香港|🇭🇰|HK|HongKong|HKG/i"}
  - {name: 🇸🇬Singapore,     <<: *Selector, proxies: [🇸🇬SG-Auto], filter: "/坡|🇸🇬|狮城|新加坡|SG|Singapore|SIN|XSP/i"}
  - {name: 🇹🇼Taiwan,        <<: *Selector, proxies: [🇹🇼TW-Auto], filter: "/台灣|台湾|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH/i"}
  - {name: 🇺🇸United States, <<: *Selector, proxies: [🇺🇸US-Auto], filter: "/美|美国|🇺🇸|US|凤凰城|西雅图|USA|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD/i"}
  - {name: 🇯🇵Japan,         <<: *Selector, proxies: [🇯🇵JP-Auto], filter: "/日本|东京|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK/i"}
  - {name: 🇰🇷South Korea,   <<: *Selector, proxies: [🇰🇷ROK-Auto], filter: "/韩国|🇰🇷|韓|首尔|南朝鲜|KR|KOR|ROK|Korea|South/i"}
  - {name: 🛰Others,        <<: *Selector, proxies: [], exclude-filter: "香港|坡|狮城|新加坡|台灣|台湾|日本|东京|韩|韩国|韓|首尔|南朝鲜|美|美国|凤凰城|西雅图|HK|HKG|HongKong|SG|SIN|XSP|Singapore|TW|tai|TPE|TSA|KHH|JP|Japan|NRT|HND|KIX|CTS|FUK|KR|KOR|ROK|Korea|South|US|USA|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD|🇭🇰|🇸🇬|🇹🇼|🇯🇵|🇰🇷|🇺🇸|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|续费|更多|客户端|官方|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author"}
  # Auto
  - {name: 🚀Global-Auto, <<: *UrlTest, exclude-filter: "DIRECT|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|续费|更多|客户端|官方|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author"}
  - {name: 🇭🇰HK-Auto,  <<: *UrlTest, filter: "/香港|🇭🇰|HK|HongKong|HKG/i"}
  - {name: 🇸🇬SG-Auto,  <<: *UrlTest, filter: "/坡|🇸🇬|狮城|新加坡|SG|Singapore|SIN|XSP/i"}
  - {name: 🇹🇼TW-Auto,  <<: *UrlTest, filter: "/台灣|台湾|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH/i"}
  - {name: 🇺🇸US-Auto,  <<: *UrlTest, filter: "/美|美国|🇺🇸|US|凤凰城|西雅图|USA|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD/i"}
  - {name: 🇯🇵JP-Auto,  <<: *UrlTest, filter: "/日本|东京|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK/i"}
  - {name: 🇰🇷ROK-Auto, <<: *UrlTest, filter: "/韩国|🇰🇷|韓|首尔|南朝鲜|KR|KOR|ROK|Korea|South/i"}
rules: 
  # REJECT
  - RULE-SET,category-ads-all,REJECT-DROP
  # Domain
  - RULE-SET,category-ai-!cn,AI Platform
  - RULE-SET,youtube,Google
  - RULE-SET,google,Google
  - RULE-SET,github,Google
  - RULE-SET,telegram,Telegram
  - RULE-SET,meta,Meta
  - RULE-SET,geolocation-cn,DIRECT
  - RULE-SET,tld-cn,DIRECT
  # IP
  - RULE-SET,google_ip,Google,no-resolve
  - RULE-SET,telegram_ip,Telegram,no-resolve
  - RULE-SET,facebook_ip,Meta,no-resolve
  - RULE-SET,cn_ip,DIRECT
  - MATCH,🚀Global
rule-providers: 
  # Domain
  telegram: {<<: *DomainMrs, url: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo-lite/geosite/telegram.mrs}
